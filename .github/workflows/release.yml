name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build godis ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: riscv64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        continue-on-error: true
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
          GOEXPERIMENT: jsonv2
        run: |
          output_name="godis"
          if [ "${{ matrix.os }}" = "windows" ]; then
            output_name="godis.exe"
          fi
          go build -tags greenteagc -ldflags="-s -w" -o "$output_name" ./cmd/godis/

      - name: Package
        run: |
          output_name="godis"
          if [ "${{ matrix.os }}" = "windows" ]; then
            output_name="godis.exe"
          fi
          archive_name="godis_${{ matrix.os }}_${{ matrix.arch }}.zip"
          # Include standalone.toml configuration template
          zip "$archive_name" "$output_name"
          if [ -f "config/standalone.toml" ]; then
            zip "$archive_name" "config/standalone.toml"
          fi
          rm -f "$output_name"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godis_${{ matrix.os }}_${{ matrix.arch }}
          path: godis_${{ matrix.os }}_${{ matrix.arch }}.zip

  release:
    name: Create Release
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Checksums
        run: |
          cd artifacts
          find . -name '*.zip' -exec shasum -a 256 {} \; > checksums.txt
          cat checksums.txt

      - name: Prepare Release Notes
        run: |
          cp docs/CHANGELOGS.md CHANGELOGS-latest.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: godis ${{ github.ref_name }}
          body: |
            ## godis ${{ github.ref_name }}

            Redis 8.8.0 compatible server with RediSearch, Redis-Vector, and Time Series support.

            ### Features
            - RESP3 protocol support
            - Array data type (AR* commands)
            - INCREX rate limiter
            - ZUNION/ZINTER with COUNT
            - Hash field-level notifications
            - Streams with XNACK
            - RediSearch (FT.CREATE, FT.SEARCH, FT.DROPINDEX)
            - Redis-Vector (VECTOR field type, KNN search)
            - Time Series (TS.CREATE, TS.ADD, TS.GET, TS.RANGE)
            - Arena memory management
            - Compatible with go-redis and rueidis
          files: |
            artifacts/*/*.zip
            CHANGELOGS-latest.md
          draft: false
          prerelease: false

  upload-checksums:
    if: ${{ !cancelled() }}
    name: Upload Checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload Checksums
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/checksums.txt
