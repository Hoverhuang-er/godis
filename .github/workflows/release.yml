name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build godis ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: riscv64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        continue-on-error: true
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
          GOEXPERIMENT: jsonv2
        run: |
          output_name="godis"
          [ "${{ matrix.os }}" = "windows" ] && output_name="godis.exe"
          go build -tags greenteagc -ldflags="-s -w" -o "$output_name" ./cmd/godis/

      - name: Package
        run: |
          output_name="godis"
          [ "${{ matrix.os }}" = "windows" ] && output_name="godis.exe"
          archive_name="godis_${{ matrix.os }}_${{ matrix.arch }}.zip"
          zip "$archive_name" "$output_name"
          [ -f "config/standalone.toml" ] && zip "$archive_name" "config/standalone.toml"
          rm -f "$output_name"

      - uses: actions/upload-artifact@v4
        with:
          name: godis_${{ matrix.os }}_${{ matrix.arch }}
          path: godis_${{ matrix.os }}_${{ matrix.arch }}.zip

  # ---- Docker: godis image ----
  godis-image:
    name: Build and Push Godis Docker Image
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LC }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/riscv64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Docker: operator image ----
  operator-image:
    name: Build and Push Operator Docker Image
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/operator:${{ github.ref_name }}
            ghcr.io/${{ env.REPO_LC }}/operator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Helm chart ----
  helm-chart:
    name: Publish Helm Chart
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Package Helm Chart
        run: helm package charts/godis --destination .tmp/

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm Chart to GHCR
        run: helm push .tmp/godis-*.tgz oci://ghcr.io/${{ env.REPO_LC }}/charts

  # ---- GitHub Release ----
  release:
    name: Create Release
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Checksums
        run: |
          cd artifacts
          find . -name '*.zip' -exec shasum -a 256 {} \; > checksums.txt
          cat checksums.txt

      - name: Generate Release Changelog
        run: |
          echo "## godis ${{ github.ref_name }}" > CHANGELOGS-latest.md
          echo "" >> CHANGELOGS-latest.md
          if [ -f docs/CHANGELOGS.md ]; then
            cat docs/CHANGELOGS.md >> CHANGELOGS-latest.md
          else
            prev_tag=$(git tag --sort=-creatordate | head -2 | tail -1)
            echo "Changes since ${prev_tag}:" >> CHANGELOGS-latest.md
            echo "" >> CHANGELOGS-latest.md
            git log --oneline --no-decorate ${prev_tag}..HEAD 2>/dev/null \
              | sed 's/^/- /' >> CHANGELOGS-latest.md || true
          fi
          echo "" >> CHANGELOGS-latest.md
          cat CHANGELOGS-latest.md

      - uses: softprops/action-gh-release@v2
        with:
          name: godis ${{ github.ref_name }}
          body: |
            ## godis ${{ github.ref_name }}

            Redis 8.8.0 compatible server with RediSearch, Redis-Vector, and Time Series support.

            ### What's Included
            - 7 binary archives (linux/amd64,arm64,riscv64 + windows/amd64,arm64 + darwin/amd64,arm64)
            - Docker image: ghcr.io/${{ github.repository }}:{{version}}
            - Operator image: ghcr.io/${{ github.repository }}/operator:{{version}}
            - Helm chart: oci://ghcr.io/${{ github.repository }}/charts/godis:{{version}}
          files: |
            artifacts/*/*.zip
            CHANGELOGS-latest.md
          draft: false
          prerelease: false

  # ---- Upload checksums ----
  upload-checksums:
    if: ${{ !cancelled() }}
    name: Upload Checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/checksums.txt
