# Godis Standalone Configuration
# This is a TOML-format configuration file for standalone mode.
# Copy this file as standalone.toml in your working directory, or set
# the CONFIG environment variable to point to it.
#
# Usage:
#   CONFIG=standalone.toml ./godis
#   or simply place standalone.toml in the working directory.

config_mode = "standalone"

[server]
# Bind address for the Redis service
bind = "0.0.0.0"

# Port to listen on
port = 6399

# Working directory for AOF, RDB, and cluster data
# dir = "/opt/godis"

# Maximum number of client connections
maxclients = 128

# Number of databases
databases = 16

# Use gnet event-loop TCP server for better IO performance
# use_gnet = false

[aof]
# Enable AOF persistence
# Note: Godis RDB is generated by AOF rewriting.
# Enable AOF if you need persistence or replication.
appendonly = false

# AOF filename (stored in the directory specified by server.dir)
appendfilename = "appendonly.aof"

# Fsync policy: "always", "everysec", or "no"
appendfsync = "everysec"

# Use RDB preamble in AOF rewrite (hybrid persistence)
aof_use_rdb_preamble = true

# RDB filename
dbfilename = "test.rdb"

[security]
# Password for client authentication
# requirepass = "yourpassword"

# Password for master authentication (replication)
# masterauth = "masterpassword"

[replication]
# Advertised address for NAT traversal
# announce_host = "5.5.5.5"

# Slave announcement port
# slave_announce_port = 6399

# Replication timeout in seconds
# repl_timeout = 60

[cluster]
# Enable worker pool for parallel relay processing (cluster mode only)
worker_pool = true

# Enable parallel relay for multi-node transactions (cluster mode only)
relay_parallel = true

[slowlog]
# Commands slower than this threshold (microseconds) are logged
log_slower_than = 10000

# Maximum length of the slow log
max_len = 128

[monitoring]
# Enable Prometheus metrics endpoint (enabled by default)
prometheus_enabled = true

# Prometheus metrics HTTP server port
prometheus_port = 9121
